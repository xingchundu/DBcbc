<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<!-- 查询驱动列表 -->
<div class="form-container">
    <div class="card-header">
        <h3 class="card-title text-center">驱动管理</h3>
    </div>
    <div class="card-body">
        <div class="grid grid-cols-6 items-center">
            <div id="searchMapping" class="lg:col-span-2 search-wrapper">
                <i class="fa fa-search search-icon"></i>
                <input class="search-input" type="text" maxlength="32" placeholder="搜索驱动名称">
                <span class="search-clear" title="清除">
                    <i class="fa fa-times"></i>
                </span>
            </div>
            <div class="lg:col-span-1">
                <select id="searchMappingState" class="form-control">
                    <option value="" selected="selected">全部状态</option>
                    <option value="1">运行中</option>
                    <option value="0">未运行</option>
                </select>
            </div>
            <div class="lg:col-span-1"></div>
            <div class="lg:col-span-2 flex items-center justify-end">
                <button class="btn btn-success" id="batchStartBtn" disabled="disabled" onclick="batchStartMappings()" style="margin-right:5px;">
                    <i class="fa fa-play"></i> 批量启动
                </button>
                <button class="btn btn-warning" id="batchStopBtn" disabled="disabled" onclick="batchStopMappings()" style="margin-right:5px;">
                    <i class="fa fa-pause"></i> 批量停止
                </button>
                <button class="btn btn-primary" id="addMappingBtn" onclick="doLoader('/mapping/pageAdd')">
                    <i class="fa fa-plus"></i> 添加
                </button>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th></th>
                <th><input type="checkbox" id="mappingCheckboxAll" onclick="toggleAllMappings(this)" /></th>
                <th>名称</th>
                <th>同步方案</th>
                <th>类型</th>
                <th>结果</th>
                <th>状态</th>
                <th>同步延迟</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="mappingTableBody"></tbody>
        </table>

    </div>
</div>

<script>
function syncErrorTypeLabel(type, json) {
    if (type === '43') {
        return '增量同步';
    }
    if (type === '44') {
        return '全量同步';
    }
    if (json && json.indexOf('启动驱动失败') >= 0) {
        return '启动失败';
    }
    return '同步异常';
}

function renderMappingSyncResult(mapping) {
    let html = renderSyncResult(mapping);
    const fail = mapping.meta && mapping.meta.fail ? mapping.meta.fail : 0;
    const detailLabel = fail > 0 ? '错误详情' : '同步日志';
    const safeName = escapeHtml(mapping.name || '');
    html += '<br /><span class="text-error hover-underline cursor-pointer text-sm" title="查看同步/启动错误详情" '
        + 'data-mapping-name="' + safeName + '" '
        + 'onclick="showMappingSyncErrorDetail(\'' + mapping.id + '\', this.getAttribute(\'data-mapping-name\'))">'
        + detailLabel + '</span>';
    return html;
}

function showMappingSyncErrorDetail(mappingId, mappingName) {
    doPoster('/mapping/querySyncErrors', {id: mappingId, pageNum: 1, pageSize: 50}, function (response) {
        if (!response.success) {
            bootGrowl(response.message || '加载同步日志失败', 'danger');
            return;
        }
        const paging = response.data || {};
        const rows = paging.data || [];
        let body = '<div class="text-sm text-gray-500 mb-3">驱动：<strong>' + escapeHtml(mappingName) + '</strong>，共 ' + (paging.total || 0) + ' 条</div>';
        if (rows.length === 0) {
            body += '<p class="text-center text-gray-400 py-6">暂无同步/启动错误记录</p>';
        } else {
            body += '<div style="max-height:420px;overflow:auto;"><table class="table"><thead><tr><th></th><th>时间</th><th>类型</th><th>详情</th></tr></thead><tbody>';
            rows.forEach(function (row, idx) {
                body += '<tr>'
                    + '<td>' + (idx + 1) + '</td>'
                    + '<td style="white-space:nowrap;">' + escapeHtml(formatRelativeTime(row.createTime) || '') + '</td>'
                    + '<td>' + escapeHtml(syncErrorTypeLabel(row.type, row.json)) + '</td>'
                    + '<td style="word-break:break-all;">' + escapeHtml(row.json || '') + '</td>'
                    + '</tr>';
            });
            body += '</tbody></table></div>';
        }
        showConfirm({
            title: '同步错误详情',
            icon: 'error',
            size: 'max',
            message: '以下为该驱动启动与同步过程中的错误记录（含每次启动重试）',
            body: body,
            confirmText: '关闭',
            onConfirm: function () {}
        });
    });
}

function copyMapping(id) {
    doPoster("/mapping/copy", { id: id }, function (response) {
        if (response.success) {
            bootGrowl('复制成功', 'success');
            backIndexPage();
        } else {
            bootGrowl('复制失败: ' + response.message, 'danger');
        }
    });
}

function changeMappingState(id, url, title) {
    const btn = event.target.closest('.table-action-btn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin" title="'+ title +'中"></i>';
    btn.disabled = true;
    doPoster(url, {id: id}, function (response) {
        btn.innerHTML = originalText;
        btn.disabled = false;
        if (response.success) {
            bootGrowl(title +'成功', 'success');
            backIndexPage();
        } else {
            bootGrowl(title +'失败: ' + response.message, 'danger');
        }
    })
}

function deleteMapping(id) {
    showConfirm({
        title: '确定要删除驱动？',
        icon: 'warning',
        size: 'large',
        confirmType: 'danger',
        onConfirm: function () {
            // 禁用按钮，防止重复点击
            doPoster('/mapping/remove', {id: id}, function (response) {
                if (response.success === true) {
                    bootGrowl("删除成功！", "success");
                    backIndexPage();
                } else {
                    bootGrowl(response.message || "删除失败", "danger");
                }
            });
        }
    });
}

function toggleAllMappings(checkbox) {
    const isChecked = checkbox.checked;
    document.querySelectorAll('.mappingCheckbox').forEach(function(cb) {
        cb.checked = isChecked;
    });
    updateBatchButtons();
}

function updateBatchButtons() {
    const checked = document.querySelectorAll('.mappingCheckbox:checked');
    const hasChecked = checked.length > 0;
    document.getElementById('batchStartBtn').disabled = !hasChecked;
    document.getElementById('batchStopBtn').disabled = !hasChecked;
}

function getSelectedMappingIds() {
    const ids = [];
    document.querySelectorAll('.mappingCheckbox:checked').forEach(function(cb) {
        ids.push(cb.value);
    });
    return ids;
}

function batchStartMappings() {
    const ids = getSelectedMappingIds();
    if (ids.length === 0) return;
    doPoster("/mapping/batchStart", {ids: ids.join(',')}, function(response) {
        if (response.success) {
            bootGrowl(response.message, 'success');
        } else {
            bootGrowl(response.message, 'danger');
        }
        backIndexPage();
    });
}

function batchStopMappings() {
    const ids = getSelectedMappingIds();
    if (ids.length === 0) return;
    doPoster("/mapping/batchStop", {ids: ids.join(',')}, function(response) {
        if (response.success) {
            bootGrowl(response.message, 'success');
        } else {
            bootGrowl(response.message, 'danger');
        }
        backIndexPage();
    });
}


// 页面初始化
$(document).ready(function() {
    // 定义返回函数，子页面返回
    window.backIndexPage = function () {
        doLoader('/mapping/list');
    };

    // 初始化分页管理器
    const pagination = new PaginationManager({
        requestUrl: '/mapping/search',
        tableBodySelector: '#mappingTableBody',
        renderRow: function(mapping, index) {
            return `
                <tr>
                    <td>${index}</td>
                    <td><input type="checkbox" class="mappingCheckbox" value="${mapping.id}" onclick="updateBatchButtons()" /></td>
                    <td title="${escapeHtml(mapping.name)}">
                        <span>${escapeHtml(mapping.name)}</span>
                    </td>
                    <td title="${escapeHtml(mapping.sourceConnector.name || '')} > ${escapeHtml(mapping.targetConnector.name || '')}">
                        <div class="flex items-center">
                            <img draggable="false" class='mr-3' src="${$basePath}/img/${escapeHtml(mapping.sourceConnector.config.connectorType || '')}.png" style="width: 40px; height: 40px;">
                            <span>${escapeHtml(mapping.sourceConnector.name || '')}</span>
                        </div>
                        <i class="fa fa-angle-double-down ml-3"></i>
                        <div class="flex items-center">
                            <img draggable="false" class='mr-3' src="${$basePath}/img/${escapeHtml(mapping.targetConnector.config.connectorType || '')}.png" style="width: 40px; height: 40px;">
                            <span>${escapeHtml(mapping.targetConnector.name || '')}</span>
                        </div>
                    </td>
                    <td>${renderModelText(mapping.model)}</td>
                    <td>${renderMappingSyncResult(mapping)}</td>
                    <td>${renderStateText(mapping.meta.state || 0)}</td>
                    <td>${renderSyncDelay(mapping)}</td>
                    <td>
                        <div class="flex items-center">
                            <button class="table-action-btn view" title="修改" onclick="doLoader('/mapping/page/edit?id=${mapping.id}')">
                                <i class="fa fa-edit"></i>
                            </button>
                            ${renderStateButton(mapping.meta.state || 0, mapping.id)}
                            <button class="table-action-btn copy" title="复制" onclick="copyMapping('${mapping.id}')">
                                <i class="fa fa-copy"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        },
        emptyHtml:'<td colspan="8" class="text-center"><i class="fa fa-exchange empty-icon"></i><p class="empty-text">暂无驱动</p><p class="empty-description">点击"添加"按钮创建第一个驱动</p></td>'
    });

    function getSearchParams() {
        return {
            'searchKey': searchInput.getValue(),
            'searchState': stateSelect.getValues()[0] || ''
        };
    }

    // 搜索框输入事件
    let searchInput = initSearch('searchMapping', function () {
        pagination.doSearch(getSearchParams());
    });

    // 状态下拉筛选
    let stateSelect = $('#searchMappingState').dbSelect({
        type: 'single',
        onSelect: function () {
            pagination.doSearch(getSearchParams());
        }
    });

    // 注册到全局定时刷新管理器
    PageRefreshManager.register(() => {
        pagination.doSearch(getSearchParams(), pagination.currentPage);
    });
});
</script>

</html>

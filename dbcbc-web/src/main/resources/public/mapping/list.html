<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="zh-CN">

<!-- 查询驱动列表 -->
<div class="form-container">
    <div class="card-header">
        <h3 class="card-title text-center">驱动管理</h3>
    </div>
    <div class="card-body">
        <div class="grid grid-cols-6 items-center">
            <div id="searchMapping" class="lg:col-span-2 search-wrapper">
                <i class="fa fa-search search-icon"></i>
                <input class="search-input" type="text" maxlength="32" placeholder="搜索驱动名称">
                <span class="search-clear" title="清除">
                    <i class="fa fa-times"></i>
                </span>
            </div>
            <div class="lg:col-span-1">
                <select id="searchMappingState" class="form-control">
                    <option value="" selected="selected">全部状态</option>
                    <option value="1">运行中</option>
                    <option value="0">未运行</option>
                </select>
            </div>
            <div class="lg:col-span-1"></div>
            <div class="lg:col-span-2 flex items-center justify-end">
                <button type="button" class="btn btn-success" id="batchStartBtn" disabled="disabled" style="margin-right:5px;">
                    <i class="fa fa-play"></i> 批量启动
                </button>
                <button type="button" class="btn btn-warning" id="batchStopBtn" disabled="disabled" style="margin-right:5px;">
                    <i class="fa fa-pause"></i> 批量停止
                </button>
                <button class="btn btn-primary" id="addMappingBtn" onclick="doLoader('/mapping/pageAdd')">
                    <i class="fa fa-plus"></i> 添加
                </button>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th></th>
                <th><input type="checkbox" id="mappingCheckboxAll" /></th>
                <th>名称</th>
                <th>同步方案</th>
                <th>类型</th>
                <th>结果</th>
                <th>状态</th>
                <th>同步延迟</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="mappingTableBody"></tbody>
        </table>

    </div>
</div>

<script>
function syncErrorTypeLabel(type, json) {
    if (type === '43') {
        return '增量同步';
    }
    if (type === '44') {
        return '全量同步';
    }
    if (type === '46') {
        return '增量统计';
    }
    if (type === '47') {
        return '全量统计';
    }
    if (json && json.indexOf('启动驱动失败') >= 0) {
        return '启动失败';
    }
    return '同步异常';
}

function isSyncStatsLog(type) {
    return type === '46' || type === '47';
}

function parseSyncStatsLine(json) {
    if (!json) {
        return null;
    }
    const m = String(json).match(/表(\S+)\s+(INSERT|UPDATE|DELETE|ALTER)\s+成功(\d+)\s+失败(\d+)/);
    if (!m) {
        return null;
    }
    return {
        table: m[1],
        event: m[2],
        success: parseInt(m[3], 10) || 0,
        fail: parseInt(m[4], 10) || 0
    };
}

function formatSyncStatsSummary(json) {
    const parsed = parseSyncStatsLine(json);
    if (!parsed) {
        return json || '';
    }
    let text = '表 ' + parsed.table + ' ' + parsed.event + ' ' + parsed.success + ' 条';
    if (parsed.fail > 0) {
        text += '，失败 ' + parsed.fail + ' 条';
    }
    return text;
}

function aggregateSyncStats(rows) {
    const map = {};
    (rows || []).forEach(function (row) {
        if (!isSyncStatsLog(row.type)) {
            return;
        }
        const parsed = parseSyncStatsLine(row.json);
        if (!parsed) {
            return;
        }
        if (!map[parsed.table]) {
            map[parsed.table] = {};
        }
        if (!map[parsed.table][parsed.event]) {
            map[parsed.table][parsed.event] = {success: 0, fail: 0};
        }
        map[parsed.table][parsed.event].success += parsed.success;
        map[parsed.table][parsed.event].fail += parsed.fail;
    });
    return map;
}

function renderSyncStatsSummaryHtml(statsMap) {
    const tables = Object.keys(statsMap || {}).sort();
    if (tables.length === 0) {
        return '';
    }
    let html = '<div class="mb-3 p-3 rounded border border-gray-200 bg-gray-50">'
        + '<div class="font-medium mb-2 text-gray-700">同步统计汇总</div>'
        + '<table class="table table-sm mb-0"><thead><tr>'
        + '<th>表</th><th>INSERT</th><th>UPDATE</th><th>DELETE</th><th>其他</th>'
        + '</tr></thead><tbody>';
    tables.forEach(function (table) {
        const events = statsMap[table];
        function cell(eventName) {
            const item = events[eventName];
            if (!item || (item.success === 0 && item.fail === 0)) {
                return '<span class="text-gray-400">-</span>';
            }
            let text = item.success + ' 条';
            if (item.fail > 0) {
                text += ' <span class="text-error">(失败' + item.fail + ')</span>';
            }
            return text;
        }
        html += '<tr><td>' + escapeHtml(table) + '</td>'
            + '<td>' + cell('INSERT') + '</td>'
            + '<td>' + cell('UPDATE') + '</td>'
            + '<td>' + cell('DELETE') + '</td>'
            + '<td>' + cell('ALTER') + '</td></tr>';
    });
    html += '</tbody></table></div>';
    return html;
}

function renderSyncLogDetailCell(row) {
    const fullText = row.json || '';
    if (isSyncStatsLog(row.type)) {
        const parsed = parseSyncStatsLine(fullText);
        const summary = formatSyncStatsSummary(fullText);
        const cls = parsed && parsed.fail > 0 ? 'text-warning' : 'text-success';
        return '<div class="' + cls + ' font-medium" style="word-break:break-word;line-height:1.5;" title="' + escapeHtml(summary) + '">'
            + escapeHtml(summary) + '</div>';
    }
    return renderSyncErrorDetailCell(row);
}

/** 从同步/启动日志 json 中提取主要错误信息 */
function extractSyncErrorSummary(json) {
    if (!json) {
        return '';
    }
    let text = String(json).trim();

    const startIdx = text.indexOf('启动驱动失败');
    if (startIdx >= 0) {
        const commaIdx = text.indexOf(', ', startIdx);
        if (commaIdx >= 0 && commaIdx + 2 < text.length) {
            return text.substring(commaIdx + 2).trim();
        }
    }

    const errorIdx = text.indexOf('ERROR:');
    if (errorIdx >= 0) {
        let err = text.substring(errorIdx + 6).trim();
        const nested = err.indexOf('; nested exception');
        if (nested >= 0) {
            err = err.substring(0, nested);
        }
        const detail = err.indexOf('  详细：');
        if (detail >= 0) {
            err = err.substring(0, detail);
        }
        const callNext = err.indexOf(' Call getNextException');
        if (callNext >= 0) {
            err = err.substring(0, callNext);
        }
        return err.trim();
    }

    const execFail = text.match(/执行(?:INSERT|UPDATE|DELETE|UPSERT)失败[:：]\s*(.+)$/);
    if (execFail && execFail[1]) {
        return extractSyncErrorSummary(execFail[1]);
    }

    const colonParts = text.split(':');
    if (colonParts.length >= 3) {
        let msg = colonParts.slice(2).join(':').trim();
        if (msg.indexOf('PreparedStatementCallback') >= 0 || msg.indexOf('ERROR:') >= 0) {
            return extractSyncErrorSummary(msg);
        }
        if (msg.length > 0) {
            return msg;
        }
    }

    return text;
}

function renderSyncErrorDetailCell(row) {
    const fullText = row.json || '';
    const summary = extractSyncErrorSummary(fullText);
    const showFull = fullText && summary !== fullText;
    let html = '<div class="text-error font-medium" style="word-break:break-word;line-height:1.5;" title="' + escapeHtml(summary) + '">'
        + escapeHtml(summary || '（无错误摘要）') + '</div>';
    if (showFull) {
        html += '<details class="mt-2 text-xs text-gray-500"><summary class="cursor-pointer hover-underline">完整日志</summary>'
            + '<pre class="mt-1 mb-0 whitespace-pre-wrap" style="word-break:break-all;max-height:160px;overflow:auto;">'
            + escapeHtml(fullText) + '</pre></details>';
    }
    return html;
}

function renderMappingSyncResult(mapping) {
    let html = renderSyncResult(mapping);
    const fail = mapping.meta && mapping.meta.fail ? mapping.meta.fail : 0;
    const detailLabel = '同步信息日志';
    const safeName = escapeHtml(mapping.name || '');
    html += '<br /><span class="text-primary hover-underline cursor-pointer text-sm" title="查看同步统计与错误详情" '
        + 'data-mapping-name="' + safeName + '" '
        + 'onclick="showMappingSyncErrorDetail(\'' + mapping.id + '\', this.getAttribute(\'data-mapping-name\'))">'
        + detailLabel + '</span>';
    html += '<br /><span data-sync-stats-preview="' + mapping.id + '" class="text-xs text-gray-400"></span>';
    if (fail > 0) {
        html += '<br /><span data-sync-error-preview="' + mapping.id + '" class="text-xs text-gray-400">正在加载错误摘要...</span>';
    }
    return html;
}

function loadMappingSyncErrorPreview(mappingId) {
    doPoster('/mapping/querySyncErrors', {id: mappingId, pageNum: 1, pageSize: 20}, function (response) {
        if (!response.success) {
            return;
        }
        const rows = (response.data || {}).data || [];
        const cell = document.querySelector('[data-sync-error-preview="' + mappingId + '"]');
        if (!cell) {
            return;
        }
        const errorRow = rows.find(function (row) {
            return row.type === '43' || row.type === '44'
                || (row.json && row.json.indexOf('启动驱动失败') >= 0);
        });
        if (!errorRow) {
            cell.textContent = '';
            cell.className = '';
            return;
        }
        const summary = extractSyncErrorSummary(errorRow.json);
        if (!summary) {
            cell.textContent = '';
            cell.className = '';
            return;
        }
        const shortText = summary.length > 120 ? summary.substring(0, 120) + '…' : summary;
        cell.className = 'text-xs text-error';
        cell.style.wordBreak = 'break-word';
        cell.style.lineHeight = '1.4';
        cell.title = summary;
        cell.textContent = shortText;
    });
}

function loadMappingSyncStatsPreview(mappingId) {
    doPoster('/mapping/querySyncErrors', {id: mappingId, pageNum: 1, pageSize: 200}, function (response) {
        if (!response.success) {
            return;
        }
        const rows = (response.data || {}).data || [];
        const cell = document.querySelector('[data-sync-stats-preview="' + mappingId + '"]');
        if (!cell) {
            return;
        }
        const statsMap = aggregateSyncStats(rows);
        const tables = Object.keys(statsMap).sort();
        if (tables.length === 0) {
            cell.textContent = '';
            cell.className = '';
            return;
        }
        const parts = [];
        tables.forEach(function (table) {
            const events = statsMap[table];
            const eventParts = [];
            ['INSERT', 'UPDATE', 'DELETE'].forEach(function (event) {
                const item = events[event];
                if (item && item.success > 0) {
                    const prefix = event === 'INSERT' ? 'I' : (event === 'UPDATE' ? 'U' : 'D');
                    eventParts.push(prefix + item.success);
                }
            });
            if (eventParts.length > 0) {
                parts.push(table + ': ' + eventParts.join(' '));
            }
        });
        cell.className = 'text-xs text-success';
        cell.style.wordBreak = 'break-word';
        cell.style.lineHeight = '1.4';
        cell.title = parts.join('；');
        cell.textContent = parts.length > 2 ? parts.slice(0, 2).join('；') + '…' : parts.join('；');
    });
}

function showMappingSyncErrorDetail(mappingId, mappingName) {
    doPoster('/mapping/querySyncErrors', {id: mappingId, pageNum: 1, pageSize: 500}, function (response) {
        if (!response.success) {
            bootGrowl(response.message || '加载同步日志失败', 'danger');
            return;
        }
        const paging = response.data || {};
        const rows = paging.data || [];
        let body = '<div class="text-sm text-gray-500 mb-3">驱动：<strong>' + escapeHtml(mappingName) + '</strong>，共 ' + (paging.total || 0) + ' 条</div>';
        body += renderSyncStatsSummaryHtml(aggregateSyncStats(rows));
        if (rows.length === 0) {
            body += '<p class="text-center text-gray-400 py-6">暂无同步记录</p>';
        } else {
            body += '<div style="max-height:480px;overflow:auto;"><table class="table"><thead><tr>'
                + '<th style="width:40px;"></th>'
                + '<th style="width:100px;">时间</th>'
                + '<th style="width:80px;">类型</th>'
                + '<th>详情</th>'
                + '</tr></thead><tbody>';
            rows.forEach(function (row, idx) {
                body += '<tr>'
                    + '<td>' + (idx + 1) + '</td>'
                    + '<td style="white-space:nowrap;vertical-align:top;">' + escapeHtml(formatRelativeTime(row.createTime) || '') + '</td>'
                    + '<td style="vertical-align:top;">' + escapeHtml(syncErrorTypeLabel(row.type, row.json)) + '</td>'
                    + '<td style="vertical-align:top;">' + renderSyncLogDetailCell(row) + '</td>'
                    + '</tr>';
            });
            body += '</tbody></table></div>';
        }
        showConfirm({
            title: '同步信息日志',
            icon: 'info',
            size: 'max',
            message: '绿色为各表 INSERT/UPDATE/DELETE 统计；红色为主要错误摘要',
            body: body,
            confirmText: '关闭',
            onConfirm: function () {}
        });
    });
}

function copyMapping(id) {
    doPoster("/mapping/copy", { id: id }, function (response) {
        if (response.success) {
            bootGrowl('复制成功', 'success');
            backIndexPage();
        } else {
            bootGrowl('复制失败: ' + response.message, 'danger');
        }
    });
}

function changeMappingState(id, url, title) {
    const btn = event.target.closest('.table-action-btn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin" title="'+ title +'中"></i>';
    btn.disabled = true;
    doPoster(url, {id: id}, function (response) {
        btn.innerHTML = originalText;
        btn.disabled = false;
        if (response.success) {
            bootGrowl(title +'成功', 'success');
            backIndexPage();
        } else {
            bootGrowl(title +'失败: ' + response.message, 'danger');
        }
    })
}

function deleteMapping(id) {
    showConfirm({
        title: '确定要删除驱动？',
        icon: 'warning',
        size: 'large',
        confirmType: 'danger',
        onConfirm: function () {
            // 禁用按钮，防止重复点击
            doPoster('/mapping/remove', {id: id}, function (response) {
                if (response.success === true) {
                    bootGrowl("删除成功！", "success");
                    backIndexPage();
                } else {
                    bootGrowl(response.message || "删除失败", "danger");
                }
            });
        }
    });
}

function getRestMessage(response, fallback) {
    if (response && response.message) {
        return response.message;
    }
    if (response && response.data != null && typeof response.data === 'string') {
        return response.data;
    }
    return fallback || '';
}

function setBatchButtonDisabled(button, disabled) {
    if (!button) {
        return;
    }
    button.disabled = disabled;
    if (disabled) {
        button.setAttribute('disabled', 'disabled');
    } else {
        button.removeAttribute('disabled');
    }
}

function toggleAllMappings(checkbox) {
    const isChecked = checkbox.checked;
    document.querySelectorAll('.mappingCheckbox').forEach(function(cb) {
        cb.checked = isChecked;
    });
    updateBatchButtons();
}

function syncMappingCheckboxAllState() {
    const all = document.querySelectorAll('.mappingCheckbox');
    const checked = document.querySelectorAll('.mappingCheckbox:checked');
    const allCb = document.getElementById('mappingCheckboxAll');
    if (!allCb || all.length === 0) {
        return;
    }
    allCb.checked = all.length === checked.length;
    allCb.indeterminate = checked.length > 0 && checked.length < all.length;
}

function updateBatchButtons() {
    const checked = document.querySelectorAll('.mappingCheckbox:checked');
    const hasChecked = checked.length > 0;
    setBatchButtonDisabled(document.getElementById('batchStartBtn'), !hasChecked);
    setBatchButtonDisabled(document.getElementById('batchStopBtn'), !hasChecked);
}

function getSelectedMappingIds() {
    const ids = [];
    document.querySelectorAll('.mappingCheckbox:checked').forEach(function(cb) {
        ids.push(cb.value);
    });
    return ids;
}

function initMappingBatchActions() {
    $(document)
        .off('click.mappingBatchStart', '#batchStartBtn')
        .on('click.mappingBatchStart', '#batchStartBtn', function (e) {
            e.preventDefault();
            batchStartMappings();
        })
        .off('click.mappingBatchStop', '#batchStopBtn')
        .on('click.mappingBatchStop', '#batchStopBtn', function (e) {
            e.preventDefault();
            batchStopMappings();
        })
        .off('change.mappingBatchAll', '#mappingCheckboxAll')
        .on('change.mappingBatchAll', '#mappingCheckboxAll', function () {
            toggleAllMappings(this);
        })
        .off('change.mappingBatchItem', '.mappingCheckbox')
        .on('change.mappingBatchItem', '.mappingCheckbox', function () {
            updateBatchButtons();
            syncMappingCheckboxAllState();
        });
}

function batchStartMappings() {
    const ids = getSelectedMappingIds();
    if (ids.length === 0) {
        bootGrowl('请先勾选要启动的驱动', 'warning');
        return;
    }
    setBatchButtonDisabled(document.getElementById('batchStartBtn'), true);
    setBatchButtonDisabled(document.getElementById('batchStopBtn'), true);
    doPoster('/mapping/batchStart', {ids: ids.join(',')}, function(response) {
        if (response.success) {
            bootGrowl(getRestMessage(response, '批量启动完成'), 'success');
        } else {
            bootGrowl(getRestMessage(response, '批量启动失败'), 'danger');
        }
        backIndexPage();
    });
}

function batchStopMappings() {
    const ids = getSelectedMappingIds();
    if (ids.length === 0) {
        bootGrowl('请先勾选要停止的驱动', 'warning');
        return;
    }
    setBatchButtonDisabled(document.getElementById('batchStartBtn'), true);
    setBatchButtonDisabled(document.getElementById('batchStopBtn'), true);
    doPoster('/mapping/batchStop', {ids: ids.join(',')}, function(response) {
        if (response.success) {
            bootGrowl(getRestMessage(response, '批量停止完成'), 'success');
        } else {
            bootGrowl(getRestMessage(response, '批量停止失败'), 'danger');
        }
        backIndexPage();
    });
}


// 页面初始化
$(document).ready(function() {
    initMappingBatchActions();

    // 定义返回函数，子页面返回
    window.backIndexPage = function () {
        doLoader('/mapping/list');
    };

    // 初始化分页管理器
    const pagination = new PaginationManager({
        requestUrl: '/mapping/search',
        tableBodySelector: '#mappingTableBody',
        renderRow: function(mapping, index) {
            return `
                <tr>
                    <td>${index}</td>
                    <td><input type="checkbox" class="mappingCheckbox" value="${mapping.id}" /></td>
                    <td title="${escapeHtml(mapping.name)}">
                        <span>${escapeHtml(mapping.name)}</span>
                    </td>
                    <td title="${escapeHtml(mapping.sourceConnector.name || '')} > ${escapeHtml(mapping.targetConnector.name || '')}">
                        <div class="flex items-center">
                            <img draggable="false" class='mr-3' src="${$basePath}/img/${escapeHtml(mapping.sourceConnector.config.connectorType || '')}.png" style="width: 40px; height: 40px;">
                            <span>${escapeHtml(mapping.sourceConnector.name || '')}</span>
                        </div>
                        <i class="fa fa-angle-double-down ml-3"></i>
                        <div class="flex items-center">
                            <img draggable="false" class='mr-3' src="${$basePath}/img/${escapeHtml(mapping.targetConnector.config.connectorType || '')}.png" style="width: 40px; height: 40px;">
                            <span>${escapeHtml(mapping.targetConnector.name || '')}</span>
                        </div>
                    </td>
                    <td>${renderModelText(mapping.model)}</td>
                    <td>${renderMappingSyncResult(mapping)}</td>
                    <td>${renderStateText(mapping.meta.state || 0)}</td>
                    <td>${renderSyncDelay(mapping)}</td>
                    <td>
                        <div class="flex items-center">
                            <button class="table-action-btn view" title="修改" onclick="doLoader('/mapping/page/edit?id=${mapping.id}')">
                                <i class="fa fa-edit"></i>
                            </button>
                            ${renderStateButton(mapping.meta.state || 0, mapping.id)}
                            <button class="table-action-btn copy" title="复制" onclick="copyMapping('${mapping.id}')">
                                <i class="fa fa-copy"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        },
        emptyHtml:'<td colspan="8" class="text-center"><i class="fa fa-exchange empty-icon"></i><p class="empty-text">暂无驱动</p><p class="empty-description">点击"添加"按钮创建第一个驱动</p></td>',
        refreshCompleted: function () {
            const allCb = document.getElementById('mappingCheckboxAll');
            if (allCb) {
                allCb.checked = false;
                allCb.indeterminate = false;
            }
            updateBatchButtons();
            document.querySelectorAll('[data-sync-stats-preview]').forEach(function (el) {
                loadMappingSyncStatsPreview(el.getAttribute('data-sync-stats-preview'));
            });
            document.querySelectorAll('[data-sync-error-preview]').forEach(function (el) {
                loadMappingSyncErrorPreview(el.getAttribute('data-sync-error-preview'));
            });
        }
    });

    function getSearchParams() {
        return {
            'searchKey': searchInput.getValue(),
            'searchState': stateSelect.getValues()[0] || ''
        };
    }

    // 搜索框输入事件
    let searchInput = initSearch('searchMapping', function () {
        pagination.doSearch(getSearchParams());
    });

    // 状态下拉筛选
    let stateSelect = $('#searchMappingState').dbSelect({
        type: 'single',
        onSelect: function () {
            pagination.doSearch(getSearchParams());
        }
    });

    // 注册到全局定时刷新管理器
    PageRefreshManager.register(() => {
        pagination.doSearch(getSearchParams(), pagination.currentPage);
    });
});
</script>

</html>
